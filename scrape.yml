name: Manual Mandi Baseline Scraper

on:
  schedule:
    - cron: '0 4 * * *' # Automated execution loop triggered every day at 4:00 AM UTC
  workflow_dispatch: # Enables direct manual runtime dispatch flags via the GitHub developer UI

jobs:
  scrape-and-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v3

      - name: Initialize Python Environment
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Cloud Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Execute National Scraper
        env:
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
          DRIVE_FILE_ID: ${{ secrets.DRIVE_FILE_ID }}
          SOURCE_PIPELINE_URL: ${{ secrets.SOURCE_PIPELINE_URL }}
        run: python scraper.py
